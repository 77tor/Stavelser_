        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }

            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; 
            background-color: #ccc; transition: .4s; border-radius: 20px; 
        }
        .slider:before { 
            position: absolute; content: ""; height: 14px; width: 14px;

        }
        input:checked + .slider { background-color: var(--accent-green); }

    // Din originale algoritme for stavelsesdeling
    function splitWordIntoSyllables(word) {
        const vowels = "aeiouyæøåAEIOUYÆØÅ";
        
        if (word.includes('-')) {
            let parts = word.split('-');
            let allSyllables = [];
            parts.forEach((part) => {
                let subSyllables = splitWordIntoSyllables(part);
                allSyllables = allSyllables.concat(subSyllables);
            });
            return allSyllables;
        }

        let cleanWord = word.replace(/[.,!?;:]/g, '');
        let punctuation = word.replace(/[a-zA-ZæøåÆØÅ0-9]/g, '');

        if (cleanWord.length <= 3) return [word];
        
        let syllables = [];
        let start = 0;
        
        for (let i = 0; i < cleanWord.length; i++) {
            if (vowels.includes(cleanWord[i])) {
                let nextVowelIndex = -1;
                for (let j = i + 1; j < cleanWord.length; j++) {
                    if (vowels.includes(cleanWord[j])) {
                        nextVowelIndex = j;
                        break;
                    }
                }

                if (nextVowelIndex !== -1) {
                    let numConsonants = nextVowelIndex - i - 1;
                    let splitPoint = -1;

                    if (numConsonants === 1) {
                        splitPoint = i + 1;
                    } else if (numConsonants >= 2) {
                        let combo = cleanWord.substring(i + 1, i + 3).toLowerCase();
                        if (combo === "sk" || combo === "kj" || combo === "sj") {
                            splitPoint = i + 1;
                        } else {
                            splitPoint = i + 2;
                        }
                    }

                    if (splitPoint !== -1 && splitPoint > start) {
                        syllables.push(cleanWord.substring(start, splitPoint));
                        start = splitPoint;
                        i = splitPoint - 1;
                    }
                }
            }
        }
        
        let lastSyllable = cleanWord.substring(start) + punctuation;
        if (lastSyllable) syllables.push(lastSyllable);
        
        return syllables;
    }

        "ko-kos-bol-le", "mo-tor-syk-kel", "he-li-kop-ter", "tram-po-li-ne",  "brann-stis-sjon-en", "fot-ball-tre-ner", 
        "burs-dags-feiring", "kap-tein-sa-bel", "ko-ka-ko-la", "vaff-el-rø-re", "rem-or-sala-te", "vin-ter-fe-ri-e", "som-mer-fe-ri-e", "hoppe-slott-et", 
        "ko-kos-bol-ler", "stjer-ne-him-mel", "sjo-ko-la-de", "po-li-ti-mann", 
        "brann-kon-sta-bel", "burs-dags-pre-sent", "a-kva-ri-um", "før-ste-klas-sing", "sko-le-bø-ker",
        "burs-dags-fei-ring", "vin-ter-jak-ker",
        "ko-mo-de-skuff"
    ]
};

let valgtAntallStavelser = parseInt(document.getElementById('select-stavelser').value);
        let antallOrd = parseInt(document.getElementById('select-antall').value);

        if (input !== "") {
            gjeldendeOrdListe = input.split(/[\n,]+/).map(w => w.trim()).filter(w => w.length > 0);
        } else {
            let tilgjengeligeOrd = [...ordBank[valgtAntallStavelser]];
            tilgjengeligeOrd.sort(() => Math.random() - 0.5);
            gjeldendeOrdListe = tilgjengeligeOrd.slice(0, Math.min(antallOrd, tilgjengeligeOrd.length));
        }
    }

    // --- DEL 2: VISNING ---
    let aktuelleStavelser = parseInt(document.getElementById('select-stavelser').value);
    if (input !== "" && gjeldendeOrdListe.length > 0) {
        aktuelleStavelser = splitWordIntoSyllables(gjeldendeOrdListe[0]).length;
    }

    let kolonner = Array.from({ length: aktuelleStavelser }, () => []);

    gjeldendeOrdListe.forEach((ord, ordIndex) => {
        const stavelser = splitWordIntoSyllables(ord);
        for (let i = 0; i < aktuelleStavelser; i++) {
            let stavelsestekst = stavelser[i] || "";
            kolonner[i].push({ id: ordIndex, tekst: stavelsestekst });
        }
    });

    if (isManualClick) {
        for (let i = 1; i < aktuelleStavelser; i++) {
            kolonner[i].sort(() => Math.random() - 0.5);
        }
        window.lagredeKolonner = kolonner;
    } else if (window.lagredeKolonner) {
        kolonner = window.lagredeKolonner;
    } else {
        for (let i = 1; i < aktuelleStavelser; i++) {
            kolonner[i].sort(() => Math.random() - 0.5);
        }
        window.lagredeKolonner = kolonner;
    }

    const fasitFarger = [
        "#e74c3c", "#3498db", "#2ecc71", "#f1c40f", "#9b59b6", 
        "#e67e22", "#1abc9c", "#e84393", "#6c5ce7", "#00b894",
        "#ff7675", "#74b9ff", "#55efc4", "#ffeaa7", "#a29bfe"
    ];

    const visFasit = document.getElementById('toggle-fasit').checked;

    let html = `
        <h1 style="text-align: center; margin-top: 0; margin-bottom: 10px; font-family: sans-serif; letter-spacing: 2px;">STAVELSE-KRYSS</h1>
        <p style="text-align: center; margin-bottom: 50px; font-style: italic; font-size: 0.9em; font-family: sans-serif;">Trekk streker mellom stavelsene fra venstre til høyre for å finne ordene.</p>
        <div class="stavekryss-container" style="position: relative;">
    `;

    if (visFasit) {
        html += `<svg id="fasit-lines" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10;"></svg>`;
    }

    kolonner.forEach((kolonneData, kolonneIndeks) => {
        html += `<div class="stavekryss-column">`;
        kolonneData.forEach((item, radIndeks) => {
            
            html += `<div class="stavekryss-item">`;

            // --- ENDRET: FORBEDRET STRUKTUR SOM LÅSER PRIKKER OG TEKST I REKKEFØLGE ---
            // Punkt til venstre for teksten (inngående)
            if (kolonneIndeks > 0) {
                let dotIdVenstre = `dot-in-${item.id}-${kolonneIndeks}`;
                html += `<span id="${dotIdVenstre}" class="stavekryss-dot"></span>`;
            }
            
            const isUpper = document.getElementById('toggle-upper').checked;
            let tekstVisning = isUpper ? item.tekst.toUpperCase() : item.tekst;
            
            let stilTekst = visFasit ? `color: ${fasitFarger[item.id % fasitFarger.length]}; font-weight: bold;` : '';
            html += `<span class="stavekryss-text-node" style="min-width: 60px; text-align: center; display: inline-block; ${stilTekst}">${tekstVisning}</span>`;

            // Punkt til høyre for teksten (utgående)
            if (kolonneIndeks < aktuelleStavelser - 1) {
                let dotIdHøyre = `dot-out-${item.id}-${kolonneIndeks}`;
                html += `<span id="${dotIdHøyre}" class="stavekryss-dot"></span>`;
            }

            html += `</div>`;
        });
        html += `</div>`;
    });

    html += `</div>`;
    outputContainer.innerHTML = html;
    
    const fontFamily = document.getElementById('font-family').value;
    const fontSize = document.getElementById('font-size').value;
    const isBold = document.getElementById('toggle-bold').checked;
    
    outputContainer.style.fontSize = fontSize + "px";
    outputContainer.style.fontWeight = isBold ? "bold" : "normal";
    area.style.fontFamily = fontFamily;

    const watermark = document.getElementById('watermark');
    if (watermark) watermark.style.display = "none";

    if (visFasit) {
        setTimeout(() => {
            tegnFasitLinjer(aktuelleStavelser, kolonner.length, fasitFarger);
        }, 50);
    }
}

function tegnFasitLinjer(antallKolonner, antallRader, farger) {
    const svg = document.getElementById('fasit-lines');
    const container = document.querySelector('.stavekryss-container');
    if (!svg || !container) return;

    const containerRect = container.getBoundingClientRect();
    let linjeHTML = "";

    gjeldendeOrdListe.forEach((ord, ordId) => {
        const farge = farger[ordId % farger.length];

        for (let k = 0; k < antallKolonner - 1; k++) {
            const prikkUt = container.querySelector(`#dot-out-${ordId}-${k}`);
            const prikkInn = container.querySelector(`#dot-in-${ordId}-${k + 1}`);

            if (prikkUt && prikkInn) {
                const rectA = prikkUt.getBoundingClientRect();
                const rectB = prikkInn.getBoundingClientRect();

                // Regner ut posisjon i prosent (%) i stedet for piksler (px)
                const x1 = ((rectA.left + rectA.width / 2) - containerRect.left) / containerRect.width * 100;
                const y1 = ((rectA.top + rectA.height / 2) - containerRect.top) / containerRect.height * 100;
                const x2 = ((rectB.left + rectB.width / 2) - containerRect.left) / containerRect.width * 100;
                const y2 = ((rectB.top + rectB.height / 2) - containerRect.top) / containerRect.height * 100;

                linjeHTML += `<line x1="${x1}%" y1="${y1}%" x2="${x2}%" y2="${y2}%" stroke="${farge}" stroke-width="2.5" opacity="0.75" stroke-linecap="round" />`;
            }
        }
    });

    svg.innerHTML = linjeHTML;
}


// Tvinger appen til å tegne fasitstrekene på nytt når siden formateres om til utskrift
window.onbeforeprint = function() {
    const visFasit = document.getElementById('toggle-fasit').checked;
    if (visFasit) {
        let aktuelleStavelser = parseInt(document.getElementById('select-stavelser').value);
        const input = document.getElementById('text-input').value.trim();
        if (input !== "" && gjeldendeOrdListe.length > 0) {
            aktuelleStavelser = splitWordIntoSyllables(gjeldendeOrdListe[0]).length;
        }
        
        const fasitFarger = [
            "#e74c3c", "#3498db", "#2ecc71", "#f1c40f", "#9b59b6", 
            "#e67e22", "#1abc9c", "#e84393", "#6c5ce7", "#00b894",
            "#ff7675", "#74b9ff", "#55efc4", "#ffeaa7", "#a29bfe"
        ];
        
        // Siden vi bruker %, vil linjene automatisk strekke seg perfekt sammen med prikkene!
        tegnFasitLinjer(aktuelleStavelser, 0, fasitFarger);
    }
};

window.onafterprint = function() {
    const visFasit = document.getElementById('toggle-fasit').checked;
    if (visFasit) {
        // Tegner linjene tilbake til skjermstørrelse igjen
        window.onbeforeprint();
    }
};


function endreRekkefolge() {
    // Sjekk at det faktisk er generert en oppgave først
    if (!hasGenerated || !window.lagredeKolonner) {
        alert("Du må lage et stave-kryss først før du kan endre rekkefølgen!");
        return;
    }

    // Gå gjennom absolutt alle kolonnene (inkludert den første på venstre side) 
    // og stokk dem om uavhengig av hverandre
    window.lagredeKolonner.forEach(kolonne => {
        kolonne.sort(() => Math.random() - 0.5);
    });

    // Kjør hovedfunksjonen på nytt uten å sette isManualClick til true.
    // Siden gjeldendeOrdListe ikke er tom, vil den bruke nøyaktig samme ord,
    // men den vil plukke opp den splitter nye rekkefølgen fra window.lagredeKolonner!
    generateStaveKryss(false);
}

function resetForm() {
    if(confirm("Tømme og nullstille siden?")) {
        document.getElementById('text-input').value = "";
        document.getElementById('toggle-fasit').checked = false; // NY: Slår av fasit-bryteren
        hasGenerated = false;
        gjeldendeOrdListe = []; 
        window.lagredeKolonner = null; 
        document.getElementById('placeholder-image').style.display = "flex";
        document.getElementById('capture-area').style.display = "none";
        
        const watermark = document.getElementById('watermark');
        if (watermark) watermark.style.display = "block";
    }
}
